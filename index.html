<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GiftRabbits — конкурсы и розыгрыши</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0a0e17;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        /* ===== ОСНОВНОЙ КОНТЕЙНЕР ===== */
        .app-container {
            width: 100%;
            max-width: 420px;
            background: #111927;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* ===== ВЕРХНИЙ БАР ===== */
        .top-bar {
            padding: 20px 20px 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        .top-bar .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .top-bar .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #ff6b6b, #ff3366);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .top-bar .logo-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .top-bar .balance {
            background: rgba(255, 255, 255, 0.06);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            color: #ffd93d;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .top-bar .balance span {
            color: #ffffff;
            -webkit-text-fill-color: #ffffff;
        }
        
        /* ===== ПРОФИЛЬНАЯ КАРТОЧКА ===== */
        .profile-card {
            margin: 16px 20px 20px 20px;
            padding: 20px;
            background: linear-gradient(135deg, #1a2332, #0f1624);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .profile-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ff3366);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }
        
        .profile-info {
            flex: 1;
        }
        
        .profile-info .name {
            font-size: 18px;
            font-weight: 600;
        }
        
        .profile-info .sub {
            font-size: 13px;
            color: #8b95a9;
            margin-top: 2px;
        }
        
        .profile-info .stats {
            display: flex;
            gap: 16px;
            margin-top: 6px;
        }
        
        .profile-info .stats-item {
            font-size: 12px;
            color: #8b95a9;
        }
        
        .profile-info .stats-item strong {
            color: #ffffff;
            font-weight: 600;
        }
        
        /* ===== СТАТИСТИКА (как в RabbitsGiftBot) ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 0 20px;
            margin-bottom: 20px;
        }
        
        .stats-grid .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 14px 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .stats-grid .stat-box .number {
            font-size: 22px;
            font-weight: 700;
            color: #ff6b6b;
        }
        
        .stats-grid .stat-box .label {
            font-size: 11px;
            color: #8b95a9;
            margin-top: 4px;
        }
        
        /* ===== КНОПКИ ДЕЙСТВИЙ ===== */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 0 20px;
            margin-bottom: 20px;
        }
        
        .action-btn {
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .action-btn.primary {
            background: linear-gradient(135deg, #ff6b6b, #ff3366);
            color: #fff;
        }
        
        .action-btn.primary:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 24px rgba(255, 51, 102, 0.3);
        }
        
        .action-btn.secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .action-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .action-btn.full {
            grid-column: 1 / -1;
        }
        
        /* ===== РАЗДЕЛ "АКТИВНЫЕ РОЗЫГРЫШИ" ===== */
        .section-title {
            padding: 0 20px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .section-title .see-all {
            font-size: 12px;
            color: #ff6b6b;
            cursor: pointer;
            font-weight: 500;
        }
        
        .giveaway-list {
            padding: 0 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .giveaway-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            gap: 14px;
            align-items: center;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .giveaway-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 107, 107, 0.3);
        }
        
        .giveaway-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff6b6b20, #ff336620);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        
        .giveaway-info {
            flex: 1;
        }
        
        .giveaway-info .title {
            font-size: 15px;
            font-weight: 600;
        }
        
        .giveaway-info .desc {
            font-size: 12px;
            color: #8b95a9;
            margin-top: 2px;
        }
        
        .giveaway-info .meta {
            display: flex;
            gap: 12px;
            margin-top: 6px;
            font-size: 11px;
            color: #8b95a9;
        }
        
        .giveaway-info .meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .giveaway-status {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 12px;
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
        }
        
        .giveaway-status.active {
            background: rgba(78, 205, 196, 0.15);
            color: #4ecdc4;
        }
        
        /* ===== НИЖНЯЯ НАВИГАЦИЯ (как в Telegram) ===== */
        .bottom-nav {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            padding: 8px 12px 16px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 8px 0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: #5a667a;
            font-size: 10px;
            border: none;
            background: transparent;
        }
        
        .nav-item:hover {
            color: #ffffff;
        }
        
        .nav-item.active {
            color: #ff6b6b;
        }
        
        .nav-item .nav-icon {
            font-size: 22px;
        }
        
        /* ===== МОДАЛКА (демо) ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal-content {
            background: #1a2332;
            border-radius: 24px;
            padding: 32px 24px;
            max-width: 380px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
        }
        
        .modal-content .modal-icon {
            font-size: 56px;
            margin-bottom: 12px;
        }
        
        .modal-content h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }
        
        .modal-content p {
            color: #8b95a9;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .modal-content .modal-btn {
            padding: 12px 32px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #ff6b6b, #ff3366);
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .modal-content .modal-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 24px rgba(255, 51, 102, 0.3);
        }
        
        .modal-content .modal-close {
            margin-top: 12px;
            background: transparent;
            border: none;
            color: #5a667a;
            font-size: 13px;
            cursor: pointer;
        }
        
        /* ===== АДАПТИВ ===== */
        @media (max-width: 440px) {
            .app-container {
                border-radius: 0;
                max-width: 100%;
            }
            
            .stats-grid .stat-box .number {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
    <!-- ============================================================ -->
    <div class="app-container" id="app">

        <!-- Верхний бар -->
        <div class="top-bar">
            <div class="logo">
                <div class="logo-icon">🐰</div>
                <span class="logo-text">GiftRabbits</span>
            </div>
            <div class="balance">
                ⭐ <span id="userBalance">1 250</span>
            </div>
        </div>

        <!-- Профильная карточка -->
        <div class="profile-card">
            <div class="profile-avatar">👤</div>
            <div class="profile-info">
                <div class="name">Алексей</div>
                <div class="sub">Участник с 2024</div>
                <div class="stats">
                    <div class="stats-item">🏆 <strong id="winsCount">7</strong> побед</div>
                    <div class="stats-item">🎁 <strong id="giftsCount">12</strong> подарков</div>
                </div>
            </div>
        </div>

        <!-- Статистика -->
        <div class="stats-grid">
            <div class="stat-box">
                <div class="number" id="totalGiveaways">24</div>
                <div class="label">Всего розыгрышей</div>
            </div>
            <div class="stat-box">
                <div class="number" id="activeGiveaways">3</div>
                <div class="label">Активных</div>
            </div>
            <div class="stat-box">
                <div class="number" id="participantsCount">1 847</div>
                <div class="label">Участников</div>
            </div>
        </div>

        <!-- Кнопки действий -->
        <div class="action-buttons">
            <button class="action-btn primary" onclick="openModal('create')">
                ➕ Создать
            </button>
            <button class="action-btn secondary" onclick="openModal('join')">
                🔍 Участвовать
            </button>
            <button class="action-btn secondary full" onclick="openModal('top')">
                🏆 Топ победителей
            </button>
        </div>

        <!-- Список розыгрышей -->
        <div class="section-title">
            <span>🎯 Активные розыгрыши</span>
            <span class="see-all" onclick="openModal('all')">Все →</span>
        </div>

        <div class="giveaway-list" id="giveawayList">
            <!-- Карточки генерируются JS -->
        </div>

        <!-- Нижняя навигация -->
        <div class="bottom-nav">
            <button class="nav-item active" data-tab="home">
                <span class="nav-icon">🏠</span>
                Главная
            </button>
            <button class="nav-item" data-tab="explore" onclick="openModal('explore')">
                <span class="nav-icon">🔍</span>
                Поиск
            </button>
            <button class="nav-item" data-tab="create" onclick="openModal('create')">
                <span class="nav-icon">➕</span>
                Создать
            </button>
            <button class="nav-item" data-tab="gifts" onclick="openModal('gifts')">
                <span class="nav-icon">🎁</span>
                Подарки
            </button>
            <button class="nav-item" data-tab="profile" onclick="openModal('profile')">
                <span class="nav-icon">👤</span>
                Профиль
            </button>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- МОДАЛЬНОЕ ОКНО (демо) -->
    <!-- ============================================================ -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon">🎉</div>
            <h3 id="modalTitle">Демо-версия</h3>
            <p id="modalDesc">Это демонстрационная версия приложения. Полный функционал будет доступен после подключения базы данных и API Telegram.</p>
            <button class="modal-btn" onclick="closeModal()">Понятно!</button>
            <button class="modal-close" onclick="closeModal()">Закрыть</button>
        </div>
    </div>

    <script>
        // ============================================================
        //  ДАННЫЕ (без БД)
        // ============================================================
        
        const GIVEAWAYS = [
            {
                id: 1,
                icon: '🎮',
                title: 'Игровой набор',
                desc: 'Стим-ключи и скины',
                prize: '500⭐',
                participants: 342,
                time: '2 ч',
                status: 'active'
            },
            {
                id: 2,
                icon: '💰',
                title: 'Звёздный джекпот',
                desc: 'Розыгрыш 1000 звёзд',
                prize: '1 000⭐',
                participants: 891,
                time: '12 ч',
                status: 'active'
            },
            {
                id: 3,
                icon: '🎨',
                title: 'NFT-арт',
                desc: 'Уникальный цифровой арт',
                prize: '⏳',
                participants: 156,
                time: '1 д',
                status: 'active'
            },
            {
                id: 4,
                icon: '📱',
                title: 'iPhone 15',
                desc: 'Главный приз недели',
                prize: '📱',
                participants: 2341,
                time: '3 д',
                status: 'active'
            }
        ];
        
        // ============================================================
        //  ОТРИСОВКА
        // ============================================================
        
        function renderGiveaways() {
            const list = document.getElementById('giveawayList');
            
            list.innerHTML = GIVEAWAYS.map(g => `
                <div class="giveaway-card" onclick="openModal('giveaway_${g.id}')">
                    <div class="giveaway-icon">${g.icon}</div>
                    <div class="giveaway-info">
                        <div class="title">${g.title}</div>
                        <div class="desc">${g.desc}</div>
                        <div class="meta">
                            <span>🎯 ${g.prize}</span>
                            <span>👥 ${g.participants}</span>
                            <span>⏱️ ${g.time}</span>
                        </div>
                    </div>
                    <span class="giveaway-status active">Активен</span>
                </div>
            `).join('');
        }
        
        // ============================================================
        //  МОДАЛКА
        // ============================================================
        
        function openModal(type) {
            const modal = document.getElementById('modal');
            const icon = document.getElementById('modalIcon');
            const title = document.getElementById('modalTitle');
            const desc = document.getElementById('modalDesc');
            
            const messages = {
                'create': { icon: '🎉', title: 'Создать розыгрыш', desc: 'Здесь вы сможете создать новый конкурс с призами для ваших подписчиков. Выберите тип, установите приз и сроки.' },
                'join': { icon: '🔍', title: 'Участвовать', desc: 'Просмотр всех активных розыгрышей, в которых можно принять участие. Выберите интересующий и нажмите "Участвовать".' },
                'top': { icon: '🏆', title: 'Топ победителей', desc: 'Рейтинг самых удачливых участников. Кто выиграл больше всего призов за всё время?' },
                'all': { icon: '📋', title: 'Все розыгрыши', desc: 'Полный список всех розыгрышей — активных, завершённых и скоро запускающихся.' },
                'explore': { icon: '🔍', title: 'Поиск', desc: 'Ищите конкурсы по названию, призам или категориям. Быстрый поиск по всем розыгрышам.' },
                'gifts': { icon: '🎁', title: 'Мои подарки', desc: 'Коллекция выигранных и приобретённых подарков. Пополняется после участия в розыгрышах.' },
                'profile': { icon: '👤', title: 'Профиль', desc: 'Настройки аккаунта, статистика побед, история участия и баланс звёзд.' },
                'giveaway_1': { icon: '🎮', title: 'Игровой набор', desc: 'Розыгрыш стим-ключей и скинов. Участвуйте сейчас!' },
                'giveaway_2': { icon: '💰', title: 'Звёздный джекпот', desc: 'Главный приз — 1000 звёзд. Уже 891 участник!' },
                'giveaway_3': { icon: '🎨', title: 'NFT-арт', desc: 'Уникальный цифровой арт от известного художника.' },
                'giveaway_4': { icon: '📱', title: 'iPhone 15', desc: 'Главный приз недели! Участвуй и выиграй.' }
            };
            
            const data = messages[type] || messages['create'];
            icon.textContent = data.icon;
            title.textContent = data.title;
            desc.textContent = data.desc;
            
            modal.classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }
        
        // Закрытие по клику на фон
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        // Закрытие по Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });
        
        // ============================================================
        //  НАВИГАЦИЯ (демо)
        // ============================================================
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });
        
        // ============================================================
        //  ЭМУЛЯЦИЯ ЖИВЫХ ДАННЫХ
        // ============================================================
        
        // Счётчик участников (случайное обновление)
        setInterval(() => {
            const participantsEl = document.getElementById('participantsCount');
            const current = parseInt(participantsEl.textContent.replace(/,/g, ''));
            const change = Math.floor(Math.random() * 10) + 1;
            participantsEl.textContent = (current + change).toLocaleString();
        }, 5000);
        
        // Счётчик активных розыгрышей
        setInterval(() => {
            const activeEl = document.getElementById('activeGiveaways');
            const current = parseInt(activeEl.textContent);
            const change = Math.random() > 0.7 ? 1 : 0;
            if (change) {
                activeEl.textContent = current + change;
            }
        }, 8000);
        
        // ============================================================
        //  ЗАПУСК
        // ============================================================
        
        renderGiveaways();
        console.log('🐰 GiftRabbits демо-версия запущена!');
        console.log('📊 Активных розыгрышей:', GIVEAWAYS.length);
        console.log('💰 Баланс пользователя: 1 250⭐');
    </script>

</body>
</html>
