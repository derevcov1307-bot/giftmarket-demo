<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GiftArcade — игры с выводом</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #07070d;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            background-image: 
                radial-gradient(ellipse at 50% 0%, rgba(255, 107, 107, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(255, 51, 102, 0.05) 0%, transparent 50%);
        }
        
        .app-container {
            width: 100%;
            max-width: 400px;
            background: rgba(18, 18, 35, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 36px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 
                0 0 60px rgba(255, 107, 107, 0.06),
                0 30px 80px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            min-height: 600px;
        }
        
        /* ===== СТРАНИЦЫ ===== */
        .page {
            display: none;
            padding: 0 20px 20px 20px;
            animation: fadeIn 0.4s ease;
        }
        
        .page.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* ===== ВЕРХНИЙ БАР ===== */
        .top-bar {
            padding: 20px 20px 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 2;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            background: linear-gradient(135deg, #ff6b6b, #ff3366);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 20px rgba(255, 51, 102, 0.25);
            position: relative;
        }
        
        .logo-icon::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 16px;
            background: linear-gradient(135deg, #ff6b6b, #ff3366);
            opacity: 0.3;
            filter: blur(8px);
            z-index: -1;
        }
        
        .logo-icon img {
            width: 22px;
            height: 22px;
            filter: brightness(0) invert(1);
        }
        
        .logo-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #ff6b6b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        
        .balance {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            color: #ffd93d;
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .balance:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        
        .balance span {
            color: #fff;
            -webkit-text-fill-color: #fff;
        }
        
        /* ===== ПРОФИЛЬ ===== */
        .profile-card {
            margin: 8px 0 20px 0;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            gap: 14px;
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 2;
            transition: all 0.3s;
        }
        
        .profile-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.08);
        }
        
        .profile-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ff3366);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(255, 51, 102, 0.15);
            position: relative;
            overflow: hidden;
        }
        
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .profile-avatar .default-avatar {
            font-size: 28px;
        }
        
        .profile-info {
            flex: 1;
        }
        
        .profile-info .name {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        
        .profile-info .sub {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 2px;
        }
        
        .profile-info .stats {
            display: flex;
            gap: 16px;
            margin-top: 6px;
        }
        
        .profile-info .stats-item {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }
        
        .profile-info .stats-item strong {
            color: #fff;
            font-weight: 600;
        }
        
        /* ===== СТАТИСТИКА ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .stat-box {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 16px 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        
        .stat-box:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.06);
            transform: translateY(-2px);
        }
        
        .stat-box .number {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        
        .stat-box .label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 4px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        /* ===== КНОПКИ ===== */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .action-btn {
            padding: 14px;
            border-radius: 16px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }
        
        .action-btn.primary {
            background: linear-gradient(135deg, #ff6b6b, #ff3366);
            color: #fff;
            box-shadow: 0 4px 24px rgba(255, 51, 102, 0.2);
        }
        
        .action-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(255, 51, 102, 0.35);
        }
        
        .action-btn.primary:active {
            transform: scale(0.97);
        }
        
        .action-btn.secondary {
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        .action-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .action-btn.full {
            grid-column: 1 / -1;
        }
        
        .action-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        
        /* ===== ИГРЫ ===== */
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .section-title .see-all {
            font-size: 12px;
            background: linear-gradient(135deg, #ff6b6b, #ff3366);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            font-weight: 500;
            opacity: 0.7;
            transition: opacity 0.3s;
            border: none;
            background-color: transparent;
        }
        
        .section-title .see-all:hover {
            opacity: 1;
        }
        
        .games-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .game-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 18px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            gap: 14px;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .game-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.03), transparent);
            opacity: 0;
            transition: opacity 0.4s;
        }
        
        .game-card:hover::before {
            opacity: 1;
        }
        
        .game-card:hover {
            transform: translateX(4px);
            border-color: rgba(255, 107, 107, 0.15);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }
        
        .game-icon {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            z-index: 1;
            transition: all 0.3s;
            font-size: 28px;
        }
        
        .game-card:hover .game-icon {
            background: rgba(255, 255, 255, 0.08);
        }
        
        .game-info {
            flex: 1;
            position: relative;
            z-index: 1;
        }
        
        .game-info .title {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        
        .game-info .desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 2px;
        }
        
        .game-info .meta {
            display: flex;
            gap: 12px;
            margin-top: 6px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
        }
        
        .game-status {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 100px;
            background: rgba(78, 205, 196, 0.1);
            color: #4ecdc4;
            border: 1px solid rgba(78, 205, 196, 0.1);
            position: relative;
            z-index: 1;
            white-space: nowrap;
        }
        
        .game-status.popular {
            background: rgba(255, 107, 107, 0.1);
            color: #ff6b6b;
            border-color: rgba(255, 107, 107, 0.1);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        /* ===== ИГРОВАЯ СТРАНИЦА ===== */
        .game-page {
            text-align: center;
            padding: 20px 0;
        }
        
        .game-page .game-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .game-page .game-subtitle {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .game-area {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 30px 20px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
            position: relative;
            overflow: hidden;
        }
        
        .game-area .result-display {
            font-size: 48px;
            font-weight: 700;
            margin: 10px 0;
        }
        
        .game-area .result-display.win {
            color: #4ecdc4;
        }
        
        .game-area .result-display.lose {
            color: #ff6b6b;
        }
        
        .bet-controls {
            display: flex;
            gap: 10px;
            margin: 16px 0;
            width: 100%;
            max-width: 300px;
        }
        
        .bet-controls input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            transition: all 0.3s;
        }
        
        .bet-controls input:focus {
            border-color: rgba(255, 107, 107, 0.3);
            background: rgba(255, 255, 255, 0.06);
        }
        
        .bet-controls input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }
        
        .bet-controls button {
            padding: 12px 24px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #ff6b6b, #ff3366);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        
        .bet-controls button:hover:not(:disabled) {
            transform: scale(1.03);
            box-shadow: 0 8px 24px rgba(255, 51, 102, 0.3);
        }
        
        .bet-controls button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .quick-bets {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .quick-bets button {
            padding: 6px 14px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .quick-bets button:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        
        .game-history {
            margin-top: 16px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            max-height: 60px;
            overflow-y: auto;
        }
        
        .game-history span {
            display: inline-block;
            margin: 0 4px;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.04);
        }
        
        .game-history span.win {
            color: #4ecdc4;
            background: rgba(78, 205, 196, 0.1);
        }
        
        .game-history span.lose {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
        }
        
        .back-btn {
            padding: 10px 20px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            margin-bottom: 16px;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        
        /* ===== НИЖНЯЯ НАВИГАЦИЯ ===== */
        .bottom-nav {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            padding: 8px 12px 20px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            position: relative;
            z-index: 2;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 8px 0;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            border: none;
            background: transparent;
            position: relative;
        }
        
        .nav-item::before {
            content: '';
            position: absolute;
            inset: 4px;
            border-radius: 12px;
            background: rgba(255, 107, 107, 0);
            transition: all 0.3s;
            z-index: -1;
        }
        
        .nav-item:hover::before {
            background: rgba(255, 255, 255, 0.03);
        }
        
        .nav-item:hover {
            color: rgba(255, 255, 255, 0.7);
        }
        
        .nav-item.active {
            color: #ff6b6b;
        }
        
        .nav-item.active::before {
            background: rgba(255, 107, 107, 0.08);
        }
        
        .nav-item .nav-icon {
            font-size: 22px;
            transition: all 0.3s;
        }
        
        .nav-item.active .nav-icon {
            transform: scale(1.1);
        }
        
        /* ===== АДАПТИВ ===== */
        @media (max-width: 440px) {
            body {
                padding: 0;
                align-items: stretch;
            }
            
            .app-container {
                border-radius: 0;
                max-width: 100%;
                min-height: 100vh;
            }
            
            .stats-grid .stat-box .number {
                font-size: 18px;
            }
        }
        
        /* ===== АВТОРИЗАЦИЯ ===== */
        .auth-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(30px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .auth-overlay.show {
            display: flex;
        }
        
        .auth-card {
            background: rgba(20, 20, 40, 0.95);
            backdrop-filter: blur(40px);
            border-radius: 32px;
            padding: 40px 32px;
            max-width: 360px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .auth-card .auth-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .auth-card h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .auth-card p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        
        .auth-btn {
            padding: 16px 40px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, #ff6b6b, #ff3366);
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 24px rgba(255, 51, 102, 0.2);
            width: 100%;
        }
        
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(255, 51, 102, 0.35);
        }
        
        .auth-btn:active {
            transform: scale(0.97);
        }
        
        .auth-btn .tg-icon {
            display: inline-block;
            margin-right: 8px;
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- ЭКРАН АВТОРИЗАЦИИ -->
    <!-- ============================================================ -->
    <div class="auth-overlay show" id="authOverlay">
        <div class="auth-card">
            <div class="auth-icon">🎮</div>
            <h2>GiftArcade</h2>
            <p>Войдите через Telegram, чтобы начать играть и выигрывать звёзды</p>
            <button class="auth-btn" onclick="authViaTelegram()">
                <span class="tg-icon">✈️</span> Войти через Telegram
            </button>
            <div style="margin-top:12px;font-size:12px;color:rgba(255,255,255,0.2);">
                Демо-версия · Данные не сохраняются
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
    <!-- ============================================================ -->
    <div class="app-container" id="app" style="display:none;">

        <!-- Верхний бар -->
        <div class="top-bar">
            <div class="logo">
                <div class="logo-icon">🎮</div>
                <span class="logo-text">GiftArcade</span>
            </div>
            <div class="balance" onclick="showBalance()">
                ⭐ <span id="userBalance">1 000</span>
            </div>
        </div>

        <!-- ===== ГЛАВНАЯ СТРАНИЦА ===== -->
        <div class="page active" id="page-home">
            <!-- Профиль -->
            <div class="profile-card">
                <div class="profile-avatar" id="userAvatar">
                    <span class="default-avatar">👤</span>
                </div>
                <div class="profile-info">
                    <div class="name" id="userName">Игрок</div>
                    <div class="sub" id="userSub">Игрок с 2024</div>
                    <div class="stats">
                        <div class="stats-item">🏆 <strong id="winsCount">0</strong> побед</div>
                        <div class="stats-item">🎁 <strong id="giftsCount">0</strong> подарков</div>
                    </div>
                </div>
            </div>

            <!-- Статистика -->
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="number" id="totalGames">0</div>
                    <div class="label">Сыграно игр</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="onlinePlayers">342</div>
                    <div class="label">Сейчас играют</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="totalPrizes">5 231</div>
                    <div class="label">Выдано призов</div>
                </div>
            </div>

            <!-- Кнопки -->
            <div class="action-buttons">
                <button class="action-btn primary" onclick="addBalance(100)">
                    💰 +100⭐
                </button>
                <button class="action-btn secondary" onclick="addBalance(500)">
                    💎 +500⭐
                </button>
                <button class="action-btn secondary full" onclick="resetBalance()">
                    🔄 Сбросить баланс
                </button>
            </div>

            <!-- Игры -->
            <div class="section-title">
                <span>🎮 Игры</span>
            </div>

            <div class="games-list" id="gamesList">
                <!-- Генерируется JS -->
            </div>
        </div>

        <!-- ===== СТРАНИЦА ИГРЫ ===== -->
        <div class="page" id="page-game">
            <button class="back-btn" onclick="goHome()">← Назад</button>
            <div class="game-page">
                <div class="game-title" id="gameTitle">Plinko</div>
                <div class="game-subtitle" id="gameSubtitle">Угадай, куда упадёт шарик</div>
                
                <div class="game-area" id="gameArea">
                    <div id="gameContent">
                        <!-- Контент игры генерируется JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Нижняя навигация -->
        <div class="bottom-nav">
            <button class="nav-item active" data-page="home">
                <span class="nav-icon">🏠</span>
                Главная
            </button>
            <button class="nav-item" data-page="home">
                <span class="nav-icon">🎮</span>
                Игры
            </button>
            <button class="nav-item" data-page="home">
                <span class="nav-icon">🏆</span>
                Топ
            </button>
            <button class="nav-item" data-page="home">
                <span class="nav-icon">🎁</span>
                Подарки
            </button>
            <button class="nav-item" data-page="home">
                <span class="nav-icon">👤</span>
                Профиль
            </button>
        </div>
    </div>

    <script>
        // ============================================================
        //  TELEGRAM АВТОРИЗАЦИЯ
        // ============================================================
        
        let tg = null;
        let user = null;
        let balance = 1000;
        let totalGames = 0;
        let wins = 0;
        let gameHistory = [];
        
        function authViaTelegram() {
            try {
                tg = window.Telegram.WebApp;
                tg.expand();
                user = tg.initDataUnsafe?.user || {
                    id: 123456,
                    first_name: 'Игрок',
                    last_name: '',
                    username: 'player',
                    photo_url: null
                };
                
                document.getElementById('authOverlay').classList.remove('show');
                document.getElementById('app').style.display = 'block';
                
                initApp();
            } catch (e) {
                // Демо-режим если Telegram API недоступен
                user = {
                    id: 123456,
                    first_name: 'Демо',
                    last_name: 'Игрок',
                    username: 'demo_player',
                    photo_url: null
                };
                document.getElementById('authOverlay').classList.remove('show');
                document.getElementById('app').style.display = 'block';
                initApp();
            }
        }
        
        // ============================================================
        //  ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        
        function initApp() {
            document.getElementById('userName').textContent = 
                user.first_name + (user.last_name ? ' ' + user.last_name : '');
            
            if (user.photo_url) {
                document.querySelector('.profile-avatar').innerHTML = 
                    `<img src="${user.photo_url}" alt="avatar">`;
            }
            
            updateUI();
            renderGames();
            setupNavigation();
        }
        
        // ============================================================
        //  ДАННЫЕ ИГР
        // ============================================================
        
        const GAMES = [
            {
                id: 'plinko',
                title: 'Plinko',
                desc: 'Шарик падает в ячейки с множителями',
                icon: '🎲',
                status: '🔥 Хайп'
            },
            {
                id: 'coinflip',
                title: 'Coin Flip',
                desc: 'Орёл или решка — удвой ставку',
                icon: '🪙',
                status: 'Популярно'
            },
            {
                id: 'crash',
                title: 'Crash',
                desc: 'Забери выигрыш до падения',
                icon: '📈',
                status: 'Играть'
            }
        ];
        
        // ============================================================
        //  ОТРИСОВКА ИГР
        // ============================================================
        
        function renderGames() {
            const list = document.getElementById('gamesList');
            
            list.innerHTML = GAMES.map(g => `
                <div class="game-card" onclick="openGame('${g.id}')">
                    <div class="game-icon">${g.icon}</div>
                    <div class="game-info">
                        <div class="title">${g.title}</div>
                        <div class="desc">${g.desc}</div>
                    </div>
                    <span class="game-status ${g.status === '🔥 Хайп' ? 'popular' : ''}">${g.status}</span>
                </div>
            `).join('');
        }
        
        // ============================================================
        //  НАВИГАЦИЯ
        // ============================================================
        
        function setupNavigation() {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', function() {
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                    showPage('home');
                });
            });
        }
        
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${page}`).classList.add('active');
        }
        
        function goHome() {
            showPage('home');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.querySelector('.nav-item[data-page="home"]').classList.add('active');
        }
        
        // ============================================================
        //  ОТКРЫТИЕ ИГРЫ
        // ============================================================
        
        function openGame(gameId) {
            const game = GAMES.find(g => g.id === gameId);
            if (!game) return;
            
            document.getElementById('gameTitle').textContent = game.title;
            document.getElementById('gameSubtitle').textContent = game.desc;
            
            const content = document.getElementById('gameContent');
            
            switch(gameId) {
                case 'plinko':
                    content.innerHTML = renderPlinko();
                    break;
                case 'coinflip':
                    content.innerHTML = renderCoinFlip();
                    break;
                case 'crash':
                    content.innerHTML = renderCrash();
                    break;
            }
            
            showPage('game');
        }
        
        // ============================================================
        //  ИГРА: PLINKO
        // ============================================================
        
        function renderPlinko() {
            return `
                <div style="margin-bottom:12px;">
                    <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:4px;max-width:280px;margin:0 auto;">
                        ${Array(8).fill(0).map((_, i) => 
                            `<div style="background:rgba(255,255,255,0.05);border-radius:4px;padding:8px 0;font-size:11px;color:rgba(255,255,255,0.3);">
                                ${[0.5,1,2,5,10,5,2,1][i]}x
                            </div>`
                        ).join('')}
                    </div>
                    <div style="margin:12px 0;font-size:48px;" id="plinkoResult">🎯</div>
                </div>
                <div class="bet-controls">
                    <input type="number" id="plinkoBet" placeholder="Ставка" value="10" min="1">
                    <button onclick="playPlinko()">Бросить</button>
                </div>
                <div class="quick-bets">
                    ${[10, 25, 50, 100].map(v => 
                        `<button onclick="document.getElementById('plinkoBet').value='${v}'">${v}⭐</button>`
                    ).join('')}
                </div>
                <div class="game-history" id="plinkoHistory"></div>
            `;
        }
        
        function playPlinko() {
            const bet = parseInt(document.getElementById('plinkoBet').value) || 10;
            if (bet > balance) {
                alert('❌ Недостаточно звёзд!');
                return;
            }
            
            const multipliers = [0.5, 1, 2, 5, 10, 5, 2, 1];
            const index = Math.floor(Math.random() * multipliers.length);
            const multiplier = multipliers[index];
            const win = bet * multiplier;
            
            balance -= bet;
            totalGames++;
            
            const result = document.getElementById('plinkoResult');
            const history = document.getElementById('plinkoHistory');
            
            if (win > bet) {
                balance += win;
                wins++;
                result.textContent = `🎉 +${win}⭐`;
                result.className = 'result-display win';
                history.innerHTML += `<span class="win">+${win}</span>`;
            } else {
                result.textContent = `😔 -${bet}⭐`;
                result.className = 'result-display lose';
                history.innerHTML += `<span class="lose">-${bet}</span>`;
            }
            
            updateUI();
            
            if (history.children.length > 20) {
                history.removeChild(history.firstChild);
            }
        }
        
        // ============================================================
        //  ИГРА: COIN FLIP
        // ============================================================
        
        function renderCoinFlip() {
            return `
                <div style="margin-bottom:12px;">
                    <div style="font-size:72px;margin:10px 0;" id="coinResult">🪙</div>
                    <div style="display:flex;gap:12px;justify-content:center;">
                        <button onclick="coinFlip('heads')" style="padding:10px 24px;border-radius:14px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);color:#fff;cursor:pointer;font-size:16px;">🦅 Орёл</button>
                        <button onclick="coinFlip('tails')" style="padding:10px 24px;border-radius:14px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);color:#fff;cursor:pointer;font-size:16px;">🪙 Решка</button>
                    </div>
                </div>
                <div class="bet-controls">
                    <input type="number" id="coinBet" placeholder="Ставка" value="10" min="1">
                    <button onclick="coinFlip('random')">Кинуть</button>
                </div>
                <div class="quick-bets">
                    ${[10, 25, 50, 100].map(v => 
                        `<button onclick="document.getElementById('coinBet').value='${v}'">${v}⭐</button>`
                    ).join('')}
                </div>
                <div class="game-history" id="coinHistory"></div>
            `;
        }
        
        function coinFlip(choice) {
            const bet = parseInt(document.getElementById('coinBet').value) || 10;
            if (bet > balance) {
                alert('❌ Недостаточно звёзд!');
                return;
            }
            
            const result = Math.random() < 0.5 ? 'heads' : 'tails';
            const win = result === choice || choice === 'random';
            
            balance -= bet;
            totalGames++;
            
            const display = document.getElementById('coinResult');
            const history = document.getElementById('coinHistory');
            
            if (win) {
                const winAmount = bet * 2;
                balance += winAmount;
                wins++;
                display.textContent = result === 'heads' ? '🦅' : '🪙';
                display.className = 'result-display win';
                history.innerHTML += `<span class="win">+${winAmount}</span>`;
            } else {
                display.textContent = result === 'heads' ? '🦅' : '🪙';
                display.className = 'result-display lose';
                history.innerHTML += `<span class="lose">-${bet}</span>`;
            }
            
            updateUI();
            
            if (history.children.length > 20) {
                history.removeChild(history.firstChild);
            }
        }
        
        // ============================================================
        //  ИГРА: CRASH
        // ============================================================
        
        let crashRunning = false;
        let crashMultiplier = 1;
        let crashInterval = null;
        
        function renderCrash() {
            return `
                <div style="margin-bottom:12px;">
                    <div style="font-size:48px;font-weight:700;margin:10px 0;" id="crashMultiplier">1.00x</div>
                    <div style="font-size:14px;color:rgba(255,255,255,0.4);" id="crashStatus">Нажмите "Забрать" для выигрыша</div>
                </div>
                <div class="bet-controls">
                    <input type="number" id="crashBet" placeholder="Ставка" value="10" min="1">
                    <button id="crashBtn" onclick="crashAction()">🚀 Забрать</button>
                </div>
                <div class="quick-bets">
                    ${[10, 25, 50, 100].map(v => 
                        `<button onclick="document.getElementById('crashBet').value='${v}'">${v}⭐</button>`
                    ).join('')}
                </div>
                <div style="margin-top:8px;">
                    <button onclick="startCrash()" style="padding:8px 20px;border-radius:14px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);color:#fff;cursor:pointer;font-size:13px;">🔄 Начать раунд</button>
                </div>
                <div class="game-history" id="crashHistory"></div>
            `;
        }
        
        function startCrash() {
            if (crashRunning) return;
            
            const bet = parseInt(document.getElementById('crashBet').value) || 10;
            if (bet > balance) {
                alert('❌ Недостаточно звёзд!');
                return;
            }
            
            balance -= bet;
            totalGames++;
            crashRunning = true;
            crashMultiplier = 1;
            
            document.getElementById('crashMultiplier').textContent = '1.00x';
            document.getElementById('crashStatus').textContent = '⚡ Растёт...';
            document.getElementById('crashBtn').disabled = false;
            document.getElementById('crashBtn').textContent = '💎 Забрать';
            
            const maxMultiplier = 1 + Math.random() * 9;
            let current = 1;
            const step = 0.01 + Math.random() * 0.03;
            
            if (crashInterval) clearInterval(crashInterval);
            
            crashInterval = setInterval(() => {
                current += step;
                crashMultiplier = Math.round(current * 100) / 100;
                document.getElementById('crashMultiplier').textContent = crashMultiplier.toFixed(2) + 'x';
                
                if (crashMultiplier >= maxMultiplier) {
                    crash();
                }
            }, 100);
        }
        
        function crashAction() {
            if (!crashRunning) return;
            crash();
        }
        
        function crash() {
            if (crashInterval) {
                clearInterval(crashInterval);
                crashInterval = null;
            }
            
            crashRunning = false;
            const bet = parseInt(document.getElementById('crashBet').value) || 10;
            const winAmount = Math.floor(bet * crashMultiplier);
            
            document.getElementById('crashStatus').textContent = '💥 Краш!';
            document.getElementById('crashBtn').disabled = true;
            document.getElementById('crashBtn').textContent = '❌ Закончено';
            
            if (winAmount > bet) {
                balance += winAmount;
                wins++;
                document.getElementById('crashMultiplier').className = 'result-display win';
                document.getElementById('crashHistory').innerHTML += 
                    `<span class="win">+${winAmount}</span>`;
            } else {
                document.getElementById('crashMultiplier').className = 'result-display lose';
                document.getElementById('crashHistory').innerHTML += 
                    `<span class="lose">-${bet}</span>`;
            }
            
            updateUI();
            
            const history = document.getElementById('crashHistory');
            if (history.children.length > 20) {
                history.removeChild(history.firstChild);
            }
        }
        
        // ============================================================
        //  БАЛАНС И UI
        // ============================================================
        
        function addBalance(amount) {
            balance += amount;
            updateUI();
        }
        
        function resetBalance() {
            if (confirm('Сбросить баланс до 1000⭐?')) {
                balance = 1000;
                totalGames = 0;
                wins = 0;
                updateUI();
            }
        }
        
        function showBalance() {
            alert(`💰 Баланс: ${balance}⭐\n🏆 Побед: ${wins}\n🎮 Сыграно: ${totalGames}`);
        }
        
        function updateUI() {
            document.getElementById('userBalance').textContent = balance;
            document.getElementById('winsCount').textContent = wins;
            document.getElementById('totalGames').textContent = totalGames;
        }
        
        // ============================================================
        //  ЭМУЛЯЦИЯ ОНЛАЙНА
        // ============================================================
        
        setInterval(() => {
            const onlineEl = document.getElementById('onlinePlayers');
            const current = parseInt(onlineEl.textContent.replace(/,/g, ''));
            const change = Math.floor(Math.random() * 20) - 5;
            onlineEl.textContent = Math.max(100, current + change).toLocaleString();
        }, 4000);
        
        console.log('🎮 GiftArcade с авторизацией и играми запущен!');
    </script>

</body>
</html>
