<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GiftArcade — игры с выводом</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #07070d;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            background-image: 
                radial-gradient(ellipse at 50% 0%, rgba(255, 107, 107, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(255, 51, 102, 0.05) 0%, transparent 50%);
        }
        
        /* ===== ОСНОВНОЙ КОНТЕЙНЕР ===== */
        .app-container {
            width: 100%;
            max-width: 400px;
            background: rgba(18, 18, 35, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 36px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 
                0 0 60px rgba(255, 107, 107, 0.06),
                0 30px 80px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
        }
        
        .app-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(255, 107, 107, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }
        
        /* ===== ВЕРХНИЙ БАР ===== */
        .top-bar {
            padding: 20px 20px 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 2;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            background: linear-gradient(135deg, #ff6b6b, #ff3366);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 20px rgba(255, 51, 102, 0.25);
            position: relative;
        }
        
        .logo-icon::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 16px;
            background: linear-gradient(135deg, #ff6b6b, #ff3366);
            opacity: 0.3;
            filter: blur(8px);
            z-index: -1;
        }
        
        .logo-icon img {
            width: 22px;
            height: 22px;
            filter: brightness(0) invert(1);
        }
        
        .logo-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #ff6b6b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        
        .balance {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            color: #ffd93d;
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .balance span {
            color: #fff;
            -webkit-text-fill-color: #fff;
        }
        
        /* ===== ПРОФИЛЬ ===== */
        .profile-card {
            margin: 8px 20px 20px 20px;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            gap: 14px;
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 2;
            transition: all 0.3s;
        }
        
        .profile-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.08);
        }
        
        .profile-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ff3366);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(255, 51, 102, 0.15);
            position: relative;
        }
        
        .profile-avatar::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ff3366);
            opacity: 0.3;
            filter: blur(12px);
            z-index: -1;
        }
        
        .profile-avatar img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
        }
        
        .profile-info {
            flex: 1;
        }
        
        .profile-info .name {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        
        .profile-info .sub {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 2px;
        }
        
        .profile-info .stats {
            display: flex;
            gap: 16px;
            margin-top: 6px;
        }
        
        .profile-info .stats-item {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }
        
        .profile-info .stats-item strong {
            color: #fff;
            font-weight: 600;
        }
        
        /* ===== СТАТИСТИКА ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 0 20px;
            margin-bottom: 20px;
        }
        
        .stat-box {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 16px 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        
        .stat-box:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.06);
            transform: translateY(-2px);
        }
        
        .stat-box .number {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        
        .stat-box .label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 4px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        /* ===== КНОПКИ ===== */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 0 20px;
            margin-bottom: 20px;
        }
        
        .action-btn {
            padding: 14px;
            border-radius: 16px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }
        
        .action-btn.primary {
            background: linear-gradient(135deg, #ff6b6b, #ff3366);
            color: #fff;
            box-shadow: 0 4px 24px rgba(255, 51, 102, 0.2);
        }
        
        .action-btn.primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .action-btn.primary:hover::before {
            opacity: 1;
        }
        
        .action-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(255, 51, 102, 0.35);
        }
        
        .action-btn.primary:active {
            transform: scale(0.97);
        }
        
        .action-btn.secondary {
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        .action-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .action-btn.full {
            grid-column: 1 / -1;
        }
        
        /* ===== ИГРЫ ===== */
        .section-title {
            padding: 0 20px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .section-title .see-all {
            font-size: 12px;
            background: linear-gradient(135deg, #ff6b6b, #ff3366);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            font-weight: 500;
            opacity: 0.7;
            transition: opacity 0.3s;
        }
        
        .section-title .see-all:hover {
            opacity: 1;
        }
        
        .games-list {
            padding: 0 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .game-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 18px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            gap: 14px;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .game-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.03), transparent);
            opacity: 0;
            transition: opacity 0.4s;
        }
        
        .game-card:hover::before {
            opacity: 1;
        }
        
        .game-card:hover {
            transform: translateX(4px);
            border-color: rgba(255, 107, 107, 0.15);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }
        
        .game-icon {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            z-index: 1;
            transition: all 0.3s;
        }
        
        .game-card:hover .game-icon {
            background: rgba(255, 255, 255, 0.08);
        }
        
        .game-icon img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }
        
        .game-info {
            flex: 1;
            position: relative;
            z-index: 1;
        }
        
        .game-info .title {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        
        .game-info .desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 2px;
        }
        
        .game-info .meta {
            display: flex;
            gap: 12px;
            margin-top: 6px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
        }
        
        .game-info .meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .game-status {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 100px;
            background: rgba(78, 205, 196, 0.1);
            color: #4ecdc4;
            border: 1px solid rgba(78, 205, 196, 0.1);
            position: relative;
            z-index: 1;
            white-space: nowrap;
        }
        
        .game-status.popular {
            background: rgba(255, 107, 107, 0.1);
            color: #ff6b6b;
            border-color: rgba(255, 107, 107, 0.1);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        /* ===== НИЖНЯЯ НАВИГАЦИЯ ===== */
        .bottom-nav {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            padding: 8px 12px 20px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            position: relative;
            z-index: 2;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 8px 0;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            border: none;
            background: transparent;
            position: relative;
        }
        
        .nav-item::before {
            content: '';
            position: absolute;
            inset: 4px;
            border-radius: 12px;
            background: rgba(255, 107, 107, 0);
            transition: all 0.3s;
            z-index: -1;
        }
        
        .nav-item:hover::before {
            background: rgba(255, 255, 255, 0.03);
        }
        
        .nav-item:hover {
            color: rgba(255, 255, 255, 0.7);
        }
        
        .nav-item.active {
            color: #ff6b6b;
        }
        
        .nav-item.active::before {
            background: rgba(255, 107, 107, 0.08);
        }
        
        .nav-item .nav-icon {
            font-size: 22px;
            transition: all 0.3s;
        }
        
        .nav-item.active .nav-icon {
            transform: scale(1.1);
        }
        
        .nav-item .nav-icon img {
            width: 24px;
            height: 24px;
            filter: grayscale(1) brightness(0.4);
            transition: all 0.3s;
        }
        
        .nav-item.active .nav-icon img {
            filter: none;
        }
        
        .nav-item:hover .nav-icon img {
            filter: grayscale(0.5) brightness(0.7);
        }
        
        /* ===== МОДАЛКА ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; backdrop-filter: blur(0px); }
            to { opacity: 1; backdrop-filter: blur(24px); }
        }
        
        .modal-content {
            background: rgba(20, 20, 40, 0.95);
            backdrop-filter: blur(40px);
            border-radius: 28px;
            padding: 36px 28px;
            max-width: 380px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .modal-content .modal-icon {
            font-size: 56px;
            margin-bottom: 12px;
        }
        
        .modal-content .modal-icon img {
            width: 64px;
            height: 64px;
            object-fit: contain;
        }
        
        .modal-content h3 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .modal-content p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 24px;
        }
        
        .modal-content .modal-btn {
            padding: 14px 40px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, #ff6b6b, #ff3366);
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 24px rgba(255, 51, 102, 0.2);
        }
        
        .modal-content .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(255, 51, 102, 0.35);
        }
        
        .modal-content .modal-btn:active {
            transform: scale(0.97);
        }
        
        .modal-content .modal-close {
            margin-top: 14px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 13px;
            cursor: pointer;
            transition: color 0.3s;
        }
        
        .modal-content .modal-close:hover {
            color: rgba(255, 255, 255, 0.6);
        }
        
        /* ===== АДАПТИВ ===== */
        @media (max-width: 440px) {
            body {
                padding: 0;
                align-items: stretch;
            }
            
            .app-container {
                border-radius: 0;
                max-width: 100%;
                min-height: 100vh;
            }
            
            .stats-grid .stat-box .number {
                font-size: 18px;
            }
            
            .game-card {
                padding: 14px;
            }
        }
        
        /* ===== СКРОЛЛ ===== */
        ::-webkit-scrollbar {
            width: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
    <!-- ============================================================ -->
    <div class="app-container">

        <!-- Верхний бар -->
        <div class="top-bar">
            <div class="logo">
                <div class="logo-icon">
                    <img src="https://cdn.jsdelivr.net/npm/emoji-datasource-apple@14.0.0/img/apple/64/1f3ae.png" alt="🎮">
                </div>
                <span class="logo-text">GiftArcade</span>
            </div>
            <div class="balance">
                ⭐ <span id="userBalance">1 250</span>
            </div>
        </div>

        <!-- Профиль -->
        <div class="profile-card">
            <div class="profile-avatar">
                <img src="https://cdn.jsdelivr.net/npm/emoji-datasource-apple@14.0.0/img/apple/64/1f464.png" alt="👤">
            </div>
            <div class="profile-info">
                <div class="name">Алексей</div>
                <div class="sub">Игрок с 2024</div>
                <div class="stats">
                    <div class="stats-item">🏆 <strong id="winsCount">142</strong> побед</div>
                    <div class="stats-item">🎁 <strong id="giftsCount">38</strong> подарков</div>
                </div>
            </div>
        </div>

        <!-- Статистика -->
        <div class="stats-grid">
            <div class="stat-box">
                <div class="number" id="totalGames">12 847</div>
                <div class="label">Сыграно игр</div>
            </div>
            <div class="stat-box">
                <div class="number" id="onlinePlayers">342</div>
                <div class="label">Сейчас играют</div>
            </div>
            <div class="stat-box">
                <div class="number" id="totalPrizes">5 231</div>
                <div class="label">Выдано призов</div>
            </div>
        </div>

        <!-- Кнопки -->
        <div class="action-buttons">
            <button class="action-btn primary" onclick="openModal('deposit')">
                💰 Пополнить
            </button>
            <button class="action-btn secondary" onclick="openModal('withdraw')">
                💳 Вывести
            </button>
            <button class="action-btn secondary full" onclick="openModal('history')">
                📜 История игр
            </button>
        </div>

        <!-- Игры -->
        <div class="section-title">
            <span>🎮 Популярные игры</span>
            <span class="see-all" onclick="openModal('all')">Все →</span>
        </div>

        <div class="games-list" id="gamesList">
            <!-- Карточки генерируются JS -->
        </div>

        <!-- Нижняя навигация -->
        <div class="bottom-nav">
            <button class="nav-item active" data-tab="home">
                <span class="nav-icon">🏠</span>
                Главная
            </button>
            <button class="nav-item" data-tab="games" onclick="openModal('games')">
                <span class="nav-icon">🎮</span>
                Игры
            </button>
            <button class="nav-item" data-tab="top" onclick="openModal('top')">
                <span class="nav-icon">🏆</span>
                Топ
            </button>
            <button class="nav-item" data-tab="gifts" onclick="openModal('gifts')">
                <span class="nav-icon">🎁</span>
                Подарки
            </button>
            <button class="nav-item" data-tab="profile" onclick="openModal('profile')">
                <span class="nav-icon">👤</span>
                Профиль
            </button>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- МОДАЛКА -->
    <!-- ============================================================ -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon">🎮</div>
            <h3 id="modalTitle">Демо-версия</h3>
            <p id="modalDesc">Это демонстрационная версия игровой платформы. Полный функционал будет доступен после подключения базы данных и API.</p>
            <button class="modal-btn" onclick="closeModal()">Понятно!</button>
            <button class="modal-close" onclick="closeModal()">Закрыть</button>
        </div>
    </div>

    <script>
        // ============================================================
        //  ДАННЫЕ ИГР
        // ============================================================
        
        const GAMES = [
            {
                id: 'plinko',
                title: 'Plinko',
                desc: 'Угадай, куда упадёт шарик',
                icon: 'https://cdn.jsdelivr.net/npm/emoji-datasource-apple@14.0.0/img/apple/64/1f3b2.png',
                players: '1.2K',
                prize: 'до x1000',
                status: '🔥 Хайп'
            },
            {
                id: 'coinflip',
                title: 'Coin Flip',
                desc: 'Орёл или решка — удвой ставку',
                icon: 'https://cdn.jsdelivr.net/npm/emoji-datasource-apple@14.0.0/img/apple/64/1f3af.png',
                players: '876',
                prize: 'x2',
                status: 'Популярно'
            },
            {
                id: 'crash',
                title: 'Crash',
                desc: 'Забери выигрыш до падения',
                icon: 'https://cdn.jsdelivr.net/npm/emoji-datasource-apple@14.0.0/img/apple/64/1f4c8.png',
                players: '2.3K',
                prize: 'до x100',
                status: 'Играть'
            }
        ];
        
        // ============================================================
        //  ОТРИСОВКА
        // ============================================================
        
        function renderGames() {
            const list = document.getElementById('gamesList');
            
            list.innerHTML = GAMES.map(g => `
                <div class="game-card" onclick="openModal('game_${g.id}')">
                    <div class="game-icon">
                        <img src="${g.icon}" alt="${g.title}" loading="lazy">
                    </div>
                    <div class="game-info">
                        <div class="title">${g.title}</div>
                        <div class="desc">${g.desc}</div>
                        <div class="meta">
                            <span>👥 ${g.players}</span>
                            <span>🎯 ${g.prize}</span>
                        </div>
                    </div>
                    <span class="game-status ${g.status === '🔥 Хайп' ? 'popular' : ''}">${g.status}</span>
                </div>
            `).join('');
        }
        
        // ============================================================
        //  МОДАЛКА
        // ============================================================
        
        function openModal(type) {
            const modal = document.getElementById('modal');
            const icon = document.getElementById('modalIcon');
            const title = document.getElementById('modalTitle');
            const desc = document.getElementById('modalDesc');
            
            const messages = {
                'deposit': { icon: '💰', title: 'Пополнение баланса', desc: 'Здесь вы сможете пополнить баланс звёздами через Telegram Stars или другие способы.' },
                'withdraw': { icon: '💳', title: 'Вывод средств', desc: 'Вывод выигранных звёзд на ваш баланс в Telegram или другие платёжные системы.' },
                'history': { icon: '📜', title: 'История игр', desc: 'Полный список всех сыгранных игр: дата, сумма ставки, результат и выигрыш.' },
                'games': { icon: '🎮', title: 'Все игры', desc: 'Полный список доступных игр: Plinko, Coin Flip, Crash и другие.' },
                'top': { icon: '🏆', title: 'Топ игроков', desc: 'Рейтинг самых успешных игроков по количеству побед и выигранных звёзд.' },
                'gifts': { icon: '🎁', title: 'Мои подарки', desc: 'Коллекция подарков, полученных за достижения в играх и розыгрышах.' },
                'profile': { icon: '👤', title: 'Профиль', desc: 'Настройки аккаунта, статистика игр, баланс и история транзакций.' },
                'all': { icon: '📋', title: 'Все игры', desc: 'Полный список игр с фильтрацией по популярности, типу и размеру выигрыша.' },
                'game_plinko': { icon: '🎲', title: 'Plinko', desc: 'Бросайте шарик и смотрите, в какую ячейку он попадёт. Чем выше риск — тем больше множитель!' },
                'game_coinflip': { icon: '🪙', title: 'Coin Flip', desc: 'Классическая игра на удачу. Выберите орла или решку и удвойте свою ставку!' },
                'game_crash': { icon: '📈', title: 'Crash', desc: 'Коэффициент растёт, пока вы не заберёте выигрыш. Заберите вовремя, чтобы не потерять всё!' }
            };
            
            const data = messages[type] || messages['all'];
            
            // Если в data есть icon с URL картинки, используем img
            if (data.icon && data.icon.startsWith('http')) {
                icon.innerHTML = `<img src="${data.icon}" alt="icon">`;
            } else {
                icon.textContent = data.icon || '🎮';
            }
            
            title.textContent = data.title;
            desc.textContent = data.desc;
            
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('show');
            document.body.style.overflow = '';
        }
        
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });
        
        // ============================================================
        //  НАВИГАЦИЯ
        // ============================================================
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });
        
        // ============================================================
        //  ЭМУЛЯЦИЯ ЖИВЫХ ДАННЫХ
        // ============================================================
        
        setInterval(() => {
            const onlineEl = document.getElementById('onlinePlayers');
            const current = parseInt(onlineEl.textContent.replace(/,/g, ''));
            const change = Math.floor(Math.random() * 20) - 5;
            onlineEl.textContent = Math.max(100, current + change).toLocaleString();
        }, 4000);
        
        setInterval(() => {
            const totalEl = document.getElementById('totalGames');
            const current = parseInt(totalEl.textContent.replace(/,/g, ''));
            totalEl.textContent = (current + Math.floor(Math.random() * 10) + 1).toLocaleString();
        }, 5000);
        
        // ============================================================
        //  ЗАПУСК
        // ============================================================
        
        renderGames();
        console.log('🎮 GiftArcade 2026 демо-версия запущена!');
        console.log('🕹️ Доступно игр:', GAMES.length);
        console.log('💰 Баланс: 1 250⭐');
    </script>

</body>
</html>
